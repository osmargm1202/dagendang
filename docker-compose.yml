version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: diario_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-diario_digital}
      TZ: America/Santo_Domingo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: diario_backend
    restart: always
    ports:
      - "8080:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./backups:/app/backups
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-diario_digital}
      - FRONTEND_URL=${NEXT_PUBLIC_BASE_URL:-https://dagendang.com}
      - TZ=America/Santo_Domingo
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diario_frontend
    restart: always
    ports:
      - "3550:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://dagendang.com}
      - TZ=America/Santo_Domingo
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  postgres_data:
