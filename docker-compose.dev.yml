version: '3.8'

services:
  db_dev:
    image: postgres:15-alpine
    container_name: diario_db_dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev}
      POSTGRES_DB: ${POSTGRES_DB:-diario_digital_dev}
      TZ: America/Santo_Domingo
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  backend_dev:
    build: ./backend
    container_name: diario_backend_dev
    restart: always
    ports:
      - "8081:8000"
    env_file:
      - .env.dev
    volumes:
      - ./backend:/app
      - ./backups_dev:/app/backups
      - ./uploads_dev:/app/uploads
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres_dev}:${POSTGRES_PASSWORD:-postgres_dev}@db_dev:5432/${POSTGRES_DB:-diario_digital_dev}
      - FRONTEND_URL=${NEXT_PUBLIC_BASE_URL:-https://dev.dagendang.com}
      - TZ=America/Santo_Domingo
    depends_on:
      - db_dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend_dev:
    image: oven/bun:1
    container_name: diario_frontend_dev
    working_dir: /app
    restart: always
    ports:
      - "3551:3000"
    volumes:
      - ./frontend:/app
    env_file:
      - .env.dev
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://dev.dagendang.com}
      - TZ=America/Santo_Domingo
      - NODE_ENV=development
    depends_on:
      - backend_dev
    command: bun run dev

volumes:
  postgres_data_dev:
