version: '3.8'

services:
  frontend_dev:
    image: oven/bun:1
    container_name: diario_frontend_dev
    working_dir: /app
    restart: always
    ports:
      - "3551:3000"
    volumes:
      - ./frontend:/app
    env_file:
      - .env.dev
    environment:
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://dev.dagendang.com}
      - TZ=America/Santo_Domingo
      - NODE_ENV=development
    command: bun run dev
