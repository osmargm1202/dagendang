<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <!-- Fondo blanco puro -->
  <rect width="600" height="600" fill="#FFFFFF" />
  
  <!-- Contenedor del logotipo gráfico -->
  <g transform="translate(115, 60)">
    <!-- Cilindro de Gas Vertical (Derecha) -->
    <!-- Se aplica un desplazamiento a la izquierda para simular el solapamiento original -->
    <g id="cilindro-vertical" transform="translate(-30, 0)">
      <!-- Cuerpo del cilindro -->
      <path d="M 215,110 
               C 215,80 230,50 265,50
               C 300,50 315,80 315,110
               L 315,240
               C 315,265 295,270 265,270
               C 235,270 215,265 215,240
               Z" 
            fill="#FFDE00" stroke="#0080C5" stroke-width="6" stroke-linejoin="round" />
      
      <!-- Protector/Asa superior -->
      <path d="M 235,50 
               L 235,20
               C 235,12 245,8 265,8
               C 285,8 295,12 295,20
               L 295,50" 
            fill="#FFDE00" stroke="#0080C5" stroke-width="6" stroke-linejoin="round" />
            
      <!-- Agujero/Asa del protector -->
      <path d="M 250,32
               L 280,32
               C 285,32 285,42 280,42
               L 250,42
               C 245,42 245,32 250,32 Z" 
            fill="#FFFFFF" stroke="#0080C5" stroke-width="4" />
      
      <!-- Válvula central -->
      <path d="M 258,50 L 258,40 L 272,40 L 272,50 Z" fill="#FFDE00" stroke="#0080C5" stroke-width="4" />
      <path d="M 253,38 L 277,38" stroke="#0080C5" stroke-width="5" stroke-linecap="round" />
      
      <!-- Base del cilindro -->
      <path d="M 220,255
               C 230,275 300,275 310,255" 
            fill="none" stroke="#0080C5" stroke-width="6" stroke-linecap="round" />
      <path d="M 230,265
               C 240,275 290,275 300,265" 
            fill="none" stroke="#0080C5" stroke-width="4" stroke-linecap="round" />
    </g>

    <!-- Tanque Horizontal (Izquierda, se dibuja después para solapar al cilindro) -->
    <g id="tanque-horizontal">
      <!-- Patas del tanque -->
      <rect x="55" y="230" width="18" height="20" rx="4" fill="#FFDE00" stroke="#0080C5" stroke-width="6" stroke-linejoin="round" />
      <rect x="145" y="230" width="18" height="20" rx="4" fill="#FFDE00" stroke="#0080C5" stroke-width="6" stroke-linejoin="round" />

      <!-- Cuerpo principal -->
      <rect x="10" y="85" width="200" height="150" rx="65" fill="#FFDE00" stroke="#0080C5" stroke-width="6" stroke-linejoin="round" />
      
      <!-- Tapa superior (Entrada de carga) -->
      <path d="M 80,85 L 80,75 C 80,72 85,72 90,72 L 130,72 C 135,72 140,72 140,75 L 140,85" 
            fill="#FFDE00" stroke="#0080C5" stroke-width="6" stroke-linejoin="round" />
      
      <!-- Salida izquierda -->
      <path d="M 10,150 L 2,150 L 2,170 L 10,170" 
            fill="#FFDE00" stroke="#0080C5" stroke-width="6" stroke-linejoin="round" />
            
      <!-- Salida derecha -->
      <path d="M 210,130 L 220,130 L 220,190 L 210,190" 
            fill="#FFDE00" stroke="#0080C5" stroke-width="6" stroke-linejoin="round" />
      <path d="M 220,150 L 228,150 L 228,170 L 220,170" 
            fill="#FFDE00" stroke="#0080C5" stroke-width="6" stroke-linejoin="round" />
    </g>
  </g>
  
  <!-- Textos del Logo -->
  <g transform="translate(300, 395)" text-anchor="middle">
    <!-- KERIMET -->
    <text y="0" font-family="'Century Gothic', 'Montserrat', 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="bold" fill="#0080C5" letter-spacing="1">KERIMET</text>
    
    <!-- INVESTMENT SRL. -->
    <text y="54" font-family="'Century Gothic', 'Montserrat', 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="normal" fill="#0080C5" letter-spacing="1">INVESTMENT SRL.</text>
    
    <!-- Soluciones para Combustibles -->
    <text y="92" font-family="'Century Gothic', 'Montserrat', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="bold" fill="#1D1D1B" letter-spacing="0.5">Soluciones para Combustibles</text>
  </g>
</svg>